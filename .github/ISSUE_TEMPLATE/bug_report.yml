name: Bug report
description: Something is wrong or not working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: input
    id: device
    attributes:
      label: Device and OS
      placeholder: "iPhone 15 Pro on iOS 18.5, or MacBook Air on macOS 26"
    validations:
      required: true
  - type: input
    id: plan
    attributes:
      label: Claude plan
      placeholder: "Pro or Max"
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or anything else
